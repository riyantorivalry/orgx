databaseChangeLog:
  - changeSet:
      id: 001-create-members
      author: codex
      changes:
        - createTable:
            tableName: members
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: member_code, type: VARCHAR(50), constraints: { nullable: false, unique: true } }
              - column: { name: full_name, type: VARCHAR(150), constraints: { nullable: false } }
              - column: { name: active, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }

  - changeSet:
      id: 002-create-sessions
      author: codex
      changes:
        - createTable:
            tableName: attendance_sessions
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: event_name, type: VARCHAR(150), constraints: { nullable: false } }
              - column: { name: starts_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: ends_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(20), constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }

  - changeSet:
      id: 003-create-session-tokens
      author: codex
      changes:
        - createTable:
            tableName: session_tokens
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: session_id, type: UUID, constraints: { nullable: false } }
              - column: { name: token_hash, type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: issued_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: expires_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: revoked, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: session_tokens
            baseColumnNames: session_id
            referencedTableName: attendance_sessions
            referencedColumnNames: id
            constraintName: fk_session_tokens_session

  - changeSet:
      id: 004-create-attendance-records
      author: codex
      changes:
        - createTable:
            tableName: attendance_records
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: session_id, type: UUID, constraints: { nullable: false } }
              - column: { name: member_id, type: UUID, constraints: { nullable: false } }
              - column: { name: checked_in_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: source, type: VARCHAR(20), constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: attendance_records
            baseColumnNames: session_id
            referencedTableName: attendance_sessions
            referencedColumnNames: id
            constraintName: fk_attendance_records_session
        - addForeignKeyConstraint:
            baseTableName: attendance_records
            baseColumnNames: member_id
            referencedTableName: members
            referencedColumnNames: id
            constraintName: fk_attendance_records_member
        - addUniqueConstraint:
            tableName: attendance_records
            columnNames: session_id, member_id
            constraintName: uk_session_member

  - changeSet:
      id: 005-add-created-by-to-members
      author: codex
      changes:
        - addColumn:
            tableName: members
            columns:
              - column:
                  name: created_by
                  type: VARCHAR(100)
                  defaultValue: system
                  constraints:
                    nullable: false

  - changeSet:
      id: 006-add-member-profile-fields
      author: codex
      changes:
        - addColumn:
            tableName: members
            columns:
              - column:
                  name: dob
                  type: DATE
              - column:
                  name: blood_type
                  type: VARCHAR(5)
              - column:
                  name: address
                  type: VARCHAR(255)

  - changeSet:
      id: 007-add-member-email
      author: codex
      changes:
        - addColumn:
            tableName: members
            columns:
              - column:
                  name: email
                  type: VARCHAR(150)

  - changeSet:
      id: 008-add-member-updated-by
      author: codex
      changes:
        - addColumn:
            tableName: members
            columns:
              - column:
                  name: updated_by
                  type: VARCHAR(100)
                  defaultValue: system
                  constraints:
                    nullable: false

  - changeSet:
      id: 009-add-session-mandatory-and-updated-by
      author: codex
      changes:
        - addColumn:
            tableName: attendance_sessions
            columns:
              - column:
                  name: is_mandatory
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: VARCHAR(100)
                  defaultValue: system
                  constraints:
                    nullable: false

  - changeSet:
      id: 010-add-member-mobile-number
      author: codex
      changes:
        - addColumn:
            tableName: members
            columns:
              - column:
                  name: mobile_number
                  type: VARCHAR(30)
